global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: outside-otel
    static_configs:
      - targets: ["otel-collector:9464"]

  - job_name: outside-scheduler
    static_configs:
      - targets: ["scheduler:9090"]

  - job_name: outside-alert-sink
    static_configs:
      - targets: ["alert-sink:9090"]

  - job_name: outside-edge
    metrics_path: /metrics
    static_configs:
      - targets: ["caddy:2019"]

  - job_name: outside-postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: outside-containers
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: outside-host
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: outside-readiness
    metrics_path: /probe
    params:
      module: [outside_https]
    static_configs:
      - targets: ["https://caddy/api/readyz"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
