global:
  resolve_timeout: 5m

route:
  receiver: staging-operator-log
  group_by: [alertname, owner]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: staging-operator-log
      matchers:
        - severity="critical"
      group_wait: 10s
      repeat_interval: 30m

receivers:
  - name: staging-operator-log
    webhook_configs:
      - url: http://alert-sink:9090/alerts
        send_resolved: true

inhibit_rules:
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: [alertname, instance]
