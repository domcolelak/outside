services:
  caddy:
    ports:
      - 80:80
      - ${HTTPS_PORT:-443}:443
    volumes:
      - ./proxy/Caddyfile.public:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  blackbox-exporter:
    volumes:
      - ./observability/blackbox.public.yaml:/etc/blackbox_exporter/config.yaml:ro
