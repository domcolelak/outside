name: CI

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OUTSIDE_STORAGE_MODE: memory
      AUTH_SECRET: ci-only-auth-secret-at-least-thirty-two-bytes
      OUTSIDE_VERIFY_SECRET: ci-only-verify-secret-at-least-thirty-two-bytes
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20.20.0
          cache: npm
      - run: npm ci
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/outside_ci
      - run: npm test
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run db:validate
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/outside_ci
      - run: npm run audit:licenses
      - run: npm run audit:secrets
      - run: npm run build
        env:
          OUTSIDE_STORAGE_MODE: database
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/outside_ci
          APP_URL: https://outside-ci.example
          CRON_SECRET: ci-only-cron-secret-at-least-thirty-two-bytes
          RESEND_API_KEY: ci-only-resend-key-at-least-sixteen-bytes
          EMAIL_FROM: OUTSIDE CI <ci@outside.example>
      - run: npm audit --audit-level=high

  postgres-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: outside
          POSTGRES_PASSWORD: outside
          POSTGRES_DB: outside_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U outside -d outside_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://outside:outside@127.0.0.1:5432/outside_e2e
      OUTSIDE_STORAGE_MODE: database
      GUARDIAN_ENCRYPTION_KEY: BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc=
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20.20.0
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run test:e2e

  terraform-provider:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform-provider-outside
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
          cache: false
      - run: go mod tidy
      - run: git diff --exit-code -- go.mod go.sum
      - run: go test ./...
