name: CI

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
        env:
          AUTH_SECRET: ci-only-auth-secret-at-least-thirty-two-bytes
          OUTSIDE_VERIFY_SECRET: ci-only-verify-secret-at-least-thirty-two-bytes
          OUTSIDE_STORAGE_MODE: memory
      - run: npm audit --omit=dev --audit-level=high
